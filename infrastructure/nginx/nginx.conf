user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    upstream backend_upstream {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Static React SPA routing
        location / {
            # Standard path inside docker containers holding output compilations
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            # Simple fallback response in case distribution volume is unmapped
            error_page 404 = @fallback_dashboard;
        }

        # Fallback operational endpoint when static volumes are initializing
        location @fallback_dashboard {
            default_type text/html;
            return 200 '<html><body><h1>ChronoShield AI Operations Edge Running</h1><p>Frontend static assets are currently building/syncing.</p><p>Explore backend Swagger schemas directly: <a href="/docs">/docs</a></p></body></html>';
        }

        # API routing
        location /api {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAPI Swagger endpoints
        location /docs {
            proxy_pass http://backend_upstream/docs;
            proxy_set_header Host $host;
        }

        # OpenAPI schema definitions
        location /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
            proxy_set_header Host $host;
        }

        # FastAPI health check endpoint
        location /health {
            proxy_pass http://backend_upstream/health;
            proxy_set_header Host $host;
        }
    }
}
