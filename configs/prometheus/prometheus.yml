global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'chronoshield-ai'

scrape_configs:
  - job_name: 'chronoshield-backend'
    static_configs:
      - targets: ['chronoshield-backend:8000']
    metrics_path: '/metrics'
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'chronoshield-ai-engine'
    static_configs:
      - targets: ['chronoshield-ai-engine:8001']
    metrics_path: '/metrics'
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
