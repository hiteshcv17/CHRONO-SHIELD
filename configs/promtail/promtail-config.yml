server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: chronoshield-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: chronoshield-backend
          service: backend
          __path__: /var/log/backend/*.log

  - job_name: chronoshield-ai-engine
    static_configs:
      - targets:
          - localhost
        labels:
          job: chronoshield-ai-engine
          service: ai-engine
          __path__: /var/log/ai-engine/*.log

  - job_name: promtail-self
    static_configs:
      - targets:
          - localhost
        labels:
          job: promtail
          __path__: /var/log/promtail/*.log
