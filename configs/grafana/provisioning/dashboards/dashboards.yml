apiVersion: 1

providers:
  - name: ChronoShield Dashboards
    orgId: 1
    folder: ChronoShield AI
    folderUid: chronoshield-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
